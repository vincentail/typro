appId: com.typro.app
productName: Typro
directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - '!**/.eslintrc.{js,cjs}'
  - '!**/{.DS_Store,.git}'

# Place icon.png outside asar so app.dock.setIcon() can load it on macOS
extraResources:
  - from: resources/icon.png
    to: icon.png

# File associations — register .md / .markdown / .txt on all platforms
fileAssociations:
  - ext: md
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Editor
  - ext: markdown
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Editor
  - ext: txt
    name: Text Document
    description: Plain Text Document
    mimeType: text/plain
    role: Editor

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.productivity
  darkModeSupport: true
  icon: resources/icon.icns
  # UTI declarations for macOS file associations
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: Markdown Document
        CFBundleTypeRole: Editor
        LSHandlerRank: Alternate
        LSItemContentTypes:
          - net.daringfireball.markdown
          - public.plain-text
        CFBundleTypeExtensions:
          - md
          - markdown
          - txt

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: resources/icon.ico
  # Run as current user — no UAC prompt, no SmartScreen elevation block
  requestedExecutionLevel: asInvoker

linux:
  target:
    - target: AppImage
    - target: deb
  icon: resources/icon.png
  category: Office
  maintainer: Typro <typro@vincentail.com>
  mimeTypes:
    - text/markdown
    - text/plain

nsis:
  oneClick: false
  # Per-user install → %LOCALAPPDATA%\Programs\Typro (no admin needed)
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Typro
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico

publish:
  provider: github
  releaseType: draft
